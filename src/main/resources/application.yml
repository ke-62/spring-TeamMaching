spring:
  application:
    name: team-recruit-platform

  # PostgreSQL 데이터베이스 설정 (Supabase)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sejong_matching}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-please-change-this-in-production}
  expiration: 86400000  # 24시간 (밀리초)
  refresh-expiration: 604800000  # 7일 (밀리초)

# AI Server Configuration
ai:
  api:
    url: ${AI_SERVER_URL:http://localhost:8000}

# 세종대학교 학사정보시스템 설정
sejong:
  portal:
    login-url: https://portal.sejong.ac.kr/jsp/login/loginSSL.jsp
    student-info-url: https://portal.sejong.ac.kr/user/index.do
    base-url: https://portal.sejong.ac.kr
    auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8000/auth}
    dev-mode: false

# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /api

# 로깅 설정
logging:
  level:
    com.sejong.recruit: DEBUG
    org.springframework.security: DEBUG
