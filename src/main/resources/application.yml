spring:
  application:
    name: team-recruit-platform

  # MySQL 데이터베이스 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/sejong_matching?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
      javax:
        persistence:
          schema-generation:
            scripts:
              action: create
              create-target: ./build/schema.sql

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-please-change-this-in-production}
  expiration: 86400000  # 24시간 (밀리초)
  refresh-expiration: 604800000  # 7일 (밀리초)

# AI Server Configuration
ai:
  api:
    url: ${AI_SERVER_URL:http://localhost:5000}

# 세종대학교 학사정보시스템 설정
sejong:
  portal:
    login-url: https://portal.sejong.ac.kr/jsp/login/loginSSL.jsp
    student-info-url: https://portal.sejong.ac.kr/user/index.do
    base-url: https://portal.sejong.ac.kr
    auth-service-url: http://localhost:5001/auth
    dev-mode: false

# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /api

# 로깅 설정
logging:
  level:
    com.sejong.recruit: DEBUG
    org.springframework.security: DEBUG
